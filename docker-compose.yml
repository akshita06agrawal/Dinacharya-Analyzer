version: '3.8'

# ════════════════════════════════════════════════════════════════
# Dinacharya Analyzer — Docker Compose
# Services: app, nginx (reverse proxy), prometheus, grafana
# Usage: docker compose up -d
# ════════════════════════════════════════════════════════════════

services:

  # ── Main Application ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dinacharya-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - APP_VERSION=1.0.0
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dinacharya-network
    labels:
      - "app=dinacharya"
      - "environment=production"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dinacharya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dinacharya-network

  # ── Prometheus Metrics Collection ───────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: dinacharya-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - dinacharya-network

  # ── Grafana Dashboard ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: dinacharya-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - dinacharya-network

networks:
  dinacharya-network:
    driver: bridge
    name: dinacharya-network

volumes:
  prometheus-data:
    name: dinacharya-prometheus-data
  grafana-data:
    name: dinacharya-grafana-data
