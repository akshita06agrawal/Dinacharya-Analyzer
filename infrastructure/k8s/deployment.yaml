# ════════════════════════════════════════════════════════════════
# Dinacharya Analyzer — Kubernetes Manifests
# Includes: Namespace, Deployment, Service, HPA, ConfigMap, Secret
# Apply: kubectl apply -f infrastructure/k8s/
# ════════════════════════════════════════════════════════════════

---
# Namespace: isolate resources
apiVersion: v1
kind: Namespace
metadata:
  name: dinacharya
  labels:
    app: dinacharya
    managed-by: kubectl

---
# ConfigMap: non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: dinacharya-config
  namespace: dinacharya
data:
  NODE_ENV: "production"
  PORT: "3000"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "info"

---
# Secret: sensitive configuration (base64 encoded in real use)
# In production, use AWS Secrets Manager or Vault, not this
apiVersion: v1
kind: Secret
metadata:
  name: dinacharya-secrets
  namespace: dinacharya
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-api-key-here"  # Replace with actual key

---
# Deployment: manages pod replicas, rolling updates, rollbacks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dinacharya-deployment
  namespace: dinacharya
  labels:
    app: dinacharya
    version: "1.0.0"
  annotations:
    kubernetes.io/change-cause: "Initial deployment v1.0.0"
spec:
  replicas: 2                    # Run 2 pods for high availability
  revisionHistoryLimit: 5        # Keep 5 old ReplicaSets for rollback

  selector:
    matchLabels:
      app: dinacharya

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Can temporarily have 3 pods during update
      maxUnavailable: 0    # Never have fewer than desired during update

  template:
    metadata:
      labels:
        app: dinacharya
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      # Graceful termination (let existing requests finish)
      terminationGracePeriodSeconds: 30

      # Security context (run as non-root)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: dinacharya
          image: your-dockerhub-username/dinacharya-analyzer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          # Environment from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: dinacharya-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dinacharya-secrets
                  key: ANTHROPIC_API_KEY

          # Resource limits (prevent one pod from consuming all cluster resources)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          # Liveness probe: restart pod if app is stuck
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe: don't send traffic until app is ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Lifecycle hooks for graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

---
# Service: exposes the deployment internally
apiVersion: v1
kind: Service
metadata:
  name: dinacharya-service
  namespace: dinacharya
  labels:
    app: dinacharya
spec:
  type: ClusterIP
  selector:
    app: dinacharya
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

---
# Horizontal Pod Autoscaler: auto-scale based on CPU/memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dinacharya-hpa
  namespace: dinacharya
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dinacharya-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Ingress: expose service to internet with routing rules
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dinacharya-ingress
  namespace: dinacharya
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dinacharya.yourdomain.com
      secretName: dinacharya-tls
  rules:
    - host: dinacharya.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dinacharya-service
                port:
                  number: 80
